<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CPCT</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/login.css">
</head>
<body class="login-page" data-static="true">
    <div class="login-container">
        <div class="login-box" id="loginBox">
            <img src="/static/imgs/aleco.png" class="logo" alt="ALECO logo">
            <h2>Welcome Back</h2>
            <h3>CPCT Login Portal</h3>

            <form id="loginForm" action="#" method="POST">
                <div class="input-group">
                    <label for="username">Email</label>
                    <input id="username" type="email" name="username" required placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-field">
                        <input id="password" type="password" name="password" required placeholder="Enter your password">
                        <button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false">
                            <svg class="eye-icon eye-open" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-icon eye-closed" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <path d="M3 3l18 18"></path>
                                <path d="M10.6 10.6A3 3 0 0 0 13.4 13.4"></path>
                                <path d="M9.9 5.2A10.7 10.7 0 0 1 12 5c6.5 0 10 7 10 7a17.8 17.8 0 0 1-3.1 4.1"></path>
                                <path d="M6.6 6.6C3.7 8.5 2 12 2 12s3.5 7 10 7a10.8 10.8 0 0 0 4.1-.8"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>

            <p class="error-text" id="loginError" aria-live="polite"></p>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
